<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5 Admin Panel V1.4 CRM</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
margin:0;
padding:20px;
color:#5e4630;
}

.header{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.box{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:8px;
}

button{
padding:8px 10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6b4e36;
color:white;
font-size:12px;
margin-right:5px;
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
}

.table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

.table th, .table td{
border-bottom:1px solid #eee;
padding:6px 4px;
text-align:left;
white-space:nowrap;
}

.table th{
background:#f3ede6;
position:sticky;
top:0;
}

.small{
font-size:11px;
color:#888;
}

.loading{
padding:10px;
font-size:13px;
color:#777;
}

.checkbox{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V1.4 CRM</div>

<div class="box">

<input id="searchInput" placeholder="Search name / phone / email">

<div class="toolbar">

<button onclick="loadMembers()">Search</button>
<button onclick="selectAll()">Select All</button>
<button onclick="clearSelect()">Clear</button>

<button onclick="copySelectedPhones()">Copy Phones</button>
<button onclick="copySelectedEmails()">Copy Emails</button>

</div>

</div>

<div class="box">

<div id="members">Loading...</div>

</div>

<script>

let membersData = [];
let selected = new Set();

// =====================
function API(){
return "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";
}

// =====================
async function loadMembers(){

document.getElementById("members").innerHTML =
"<div class='loading'>Loading members...</div>";

let res = await fetch(API()+"?mode=admin_members");
let data = await res.json();

membersData = data.members || [];

renderTable(membersData);
}

// =====================
function renderTable(list){

let keyword = document.getElementById("searchInput").value.toLowerCase();

let html = `
<table class="table">
<tr>
<th></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Points</th>
<th>Action</th>
</tr>
`;

list.forEach(m => {

if(keyword &&
!(m.name.toLowerCase().includes(keyword) ||
m.phone.includes(keyword) ||
m.email.toLowerCase().includes(keyword)))
return;

html += `
<tr>

<td>
<input class="checkbox" type="checkbox"
onchange="toggle('${m.phone}')"
${selected.has(m.phone) ? "checked" : ""}>
</td>

<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.email}</td>
<td>${m.points}</td>

<td>
<button onclick="viewMember(${m.row})">View</button>
<button onclick="editMember(${m.row})">Edit</button>
</td>

</tr>
`;
});

html += "</table>";

document.getElementById("members").innerHTML = html;
}

// =====================
function toggle(phone){

if(selected.has(phone)){
selected.delete(phone);
}else{
selected.add(phone);
}

renderTable(membersData);
}

// =====================
function selectAll(){
selected = new Set(membersData.map(m => m.phone));
renderTable(membersData);
}

// =====================
function clearSelect(){
selected.clear();
renderTable(membersData);
}

// =====================
function copySelectedPhones(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.phone);

navigator.clipboard.writeText(arr.join("\n"));
alert("Copied phones: " + arr.length);
}

// =====================
function copySelectedEmails(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.email);

navigator.clipboard.writeText(arr.join("\n"));
alert("Copied emails: " + arr.length);
}

// =====================
async function viewMember(row){

let res = await fetch(API()+"?mode=admin_member_detail&row="+row);
let data = await res.json();

let m = data.member;

alert(
"Name: " + m.name + "\n" +
"Phone: " + m.phone + "\n" +
"Email: " + m.email + "\n" +
"Points: " + m.points
);

}

// =====================
async function editMember(row){

let old = membersData.find(m => m.row === row);
if(!old) return;

let name = prompt("Name", old.name);
let phone = prompt("Phone", old.phone);
let email = prompt("Email", old.email);

await fetch(API()
+ "?mode=admin_update_member"
+ "&row=" + row
+ "&name=" + encodeURIComponent(name || old.name)
+ "&phone=" + encodeURIComponent(phone || old.phone)
+ "&email=" + encodeURIComponent(email || old.email)
);

await loadMembers();

alert("Updated");
}

// =====================
loadMembers();

</script>

</body>
</html>
