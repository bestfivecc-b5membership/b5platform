<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>B5 Admin Panel V4.7</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6f1e8;
color:#4b3b2a;
}

.header{
background:#6b4e36;
color:white;
padding:14px;
text-align:center;
font-weight:bold;
}

.container{
padding:10px;
overflow-x:auto;
}

.topBar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
align-items:center;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
background:white;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
white-space:nowrap;
}

th{
background:#f3ede6;
}

button{
padding:5px 10px;
font-size:12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.btn{background:#6b4e36;color:white;}
.btn2{background:#28a745;color:white;}
.btn3{background:#ff9800;color:white;}

input{
padding:5px;
font-size:12px;
width:100%;
}

.detailBox{
background:#fff;
padding:10px;
border-radius:10px;
margin-top:10px;
display:none;
border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V4.7 FINAL</div>

<div class="container">

<div class="topBar">

<input id="searchText" placeholder="Search name / phone / email">

<button class="btn" onclick="searchMembers()">🔍 Search</button>
<button class="btn" onclick="loadMembers()">🔄 Refresh</button>

<button class="btn2" onclick="copyPhones()">📱 Phones</button>
<button class="btn2" onclick="copyEmails()">📧 Emails</button>
<button class="btn2" onclick="copyAll()">📋 Copy All</button>

<button class="btn3" onclick="exportCSV()">⬇ Export</button>

</div>

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Points</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<div id="detailBox" class="detailBox"></div>

</div>

<script>

let allMembers = [];
let filteredMembers = [];
let editIndex = null;

// =========================
async function loadMembers(){

let res = await fetch(
"https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=admin_members"
);

let data = await res.json();

allMembers = data.members || [];
filteredMembers = [...allMembers];

render();

}

// =========================
function render(){

let html = "";

filteredMembers.forEach((m,i)=>{

let isEdit = (editIndex === i);

html += `
<tr>
<td><input type="checkbox" data-i="${i}"></td>

<td>
${isEdit ? `<input value="${m.name}" oninput="m.name=this.value">` : m.name}
</td>

<td>
${isEdit ? `<input value="${m.phone}" oninput="m.phone=this.value">` : m.phone}
</td>

<td>
${isEdit ? `<input value="${m.email}" oninput="m.email=this.value">` : m.email}
</td>

<td>
${isEdit ? `<input value="${m.points}" oninput="m.points=this.value">` : m.points}
</td>

<td>
${isEdit ? `
<button class="btn2" onclick="save(${i})">Save</button>
<button onclick="cancel()">Cancel</button>
` : `
<button class="btn" onclick="view(${m.row})">View</button>
<button class="btn2" onclick="edit(${i})">Edit</button>
`}
</td>

</tr>
`;

});

document.getElementById("tbody").innerHTML = html;

}

// =========================
function searchMembers(){

let k = document.getElementById("searchText").value.toLowerCase();

filteredMembers = allMembers.filter(m =>

(m.name||"").toLowerCase().includes(k) ||
(m.phone||"").toLowerCase().includes(k) ||
(m.email||"").toLowerCase().includes(k)

);

render();

}

// =========================
function edit(i){
editIndex = i;
render();
}

// =========================
function cancel(){
editIndex = null;
render();
}

// =========================
async function save(i){

let m = filteredMembers[i];

let url =
`https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=admin_update_member`
+ `&row=${m.row}`
+ `&name=${encodeURIComponent(m.name)}`
+ `&phone=${encodeURIComponent(m.phone)}`
+ `&email=${encodeURIComponent(m.email)}`
+ `&points=${encodeURIComponent(m.points)}`;

await fetch(url);

editIndex = null;

await loadMembers();

}

// =========================
async function view(row){

let res = await fetch(
`https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=admin_member_detail&row=${row}`
);

let d = await res.json();

let m = d.member;

document.getElementById("detailBox").style.display = "block";

document.getElementById("detailBox").innerHTML = `
<b>${m.name}</b><br>
📞 ${m.phone}<br>
📧 ${m.email}<br><br>

Points: ${m.points}<br><br>

Reward: ${m.reward}<br>
Birthday: ${m.birthdayStatus}<br>
Promo: ${m.promoStatus}<br>
Referral: ${m.referral}<br>
`;

}

// =========================
function toggleAll(el){
document.querySelectorAll("input[type=checkbox]").forEach(c=>{
c.checked = el.checked;
});
}

// =========================
function getSelected(){

let list = [];
document.querySelectorAll("input[type=checkbox]:checked").forEach(c=>{
let i = c.getAttribute("data-i");
if(i !== null){
list.push(filteredMembers[i]);
}
});
return list;

}

// =========================
function copyPhones(){
navigator.clipboard.writeText(getSelected().map(m=>m.phone).join("\n"));
alert("Copied phones");
}

// =========================
function copyEmails(){
navigator.clipboard.writeText(getSelected().map(m=>m.email).join("\n"));
alert("Copied emails");
}

// =========================
function copyAll(){
let text = getSelected().map(m =>
`${m.name} | ${m.phone} | ${m.email} | ${m.points}`
).join("\n");

navigator.clipboard.writeText(text);
alert("Copied all");
}

// =========================
function exportCSV(){

let csv = "Name,Phone,Email,Points\n";

filteredMembers.forEach(m=>{
csv += `${m.name},${m.phone},${m.email},${m.points}\n`;
});

let blob = new Blob([csv],{type:"text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "members.csv";
a.click();

}

loadMembers();

</script>

</body>
</html>
