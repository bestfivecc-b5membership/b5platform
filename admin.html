<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5 Admin V2 CRM</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
margin:0;
padding:12px;
color:#5e4630;
}

.header{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.box{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
box-sizing:border-box;
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}

button{
padding:7px 9px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6b4e36;
color:white;
font-size:12px;
}

.table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
font-size:12px;
}

.table th, .table td{
border-bottom:1px solid #eee;
padding:6px;
text-align:left;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:160px;
}

.table th{
background:#f3ede6;
position:sticky;
top:0;
z-index:5;
}

.row-hover:hover{
background:#fff8ef;
}

.checkbox{
transform:scale(1.1);
}

.loading{
padding:10px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V2 CRM</div>

<div class="box">

<input id="searchInput" placeholder="Search name / phone / email">

<div class="toolbar">

<button onclick="selectAll()">☑ All</button>
<button onclick="clearSelect()">✖ Clear</button>

<button onclick="copySelectedPhones()">📱 Phones</button>
<button onclick="copySelectedEmails()">📧 Emails</button>
<button onclick="copyAllInfo()">📋 Full Copy</button>
<button onclick="exportCSV()">⬇ Export</button>

</div>

</div>

<div class="box">
<div id="members">Loading...</div>
</div>

<script>

let membersData = [];
let selected = new Set();

function API(){
return "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";
}

// =====================
// LOAD DATA
// =====================
async function loadMembers(){

document.getElementById("members").innerHTML =
"<div class='loading'>Loading...</div>";

let res = await fetch(API()+"?mode=admin_members");
let data = await res.json();

membersData = data.members || [];

renderTable(membersData);
}

// =====================
// RENDER TABLE
// =====================
function renderTable(list){

let keyword = document.getElementById("searchInput").value.toLowerCase();

let html = `
<table class="table">
<tr>
<th></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Pts</th>
</tr>
`;

list.forEach(m => {

if(keyword &&
!(m.name.toLowerCase().includes(keyword) ||
m.phone.includes(keyword) ||
m.email.toLowerCase().includes(keyword)))
return;

html += `
<tr class="row-hover">

<td>
<input class="checkbox" type="checkbox"
onchange="toggle('${m.phone}')"
${selected.has(m.phone) ? "checked" : ""}>
</td>

<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.email}</td>
<td>${m.points}</td>

</tr>
`;
});

html += "</table>";

document.getElementById("members").innerHTML = html;
}

// =====================
// INSTANT SEARCH
// =====================
document.getElementById("searchInput")
.addEventListener("input", function(){
renderTable(membersData);
});

// =====================
// SELECT TOGGLE
// =====================
function toggle(phone){

if(selected.has(phone)) selected.delete(phone);
else selected.add(phone);

renderTable(membersData);
}

// =====================
// SELECT ALL
// =====================
function selectAll(){
selected = new Set(membersData.map(m => m.phone));
renderTable(membersData);
}

// =====================
// CLEAR
// =====================
function clearSelect(){
selected.clear();
renderTable(membersData);
}

// =====================
// COPY PHONE
// =====================
function copySelectedPhones(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.phone);

navigator.clipboard.writeText(arr.join("\n"));
alert("Phones: " + arr.length);
}

// =====================
// COPY EMAIL
// =====================
function copySelectedEmails(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.email);

navigator.clipboard.writeText(arr.join("\n"));
alert("Emails: " + arr.length);
}

// =====================
// COPY ALL INFO
// =====================
function copyAllInfo(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => `${m.name} | ${m.phone} | ${m.email} | ${m.points}`);

navigator.clipboard.writeText(arr.join("\n"));
alert("Copied full info: " + arr.length);
}

// =====================
// EXPORT CSV
// =====================
function exportCSV(){

let rows = [["Name","Phone","Email","Points"]];

membersData.forEach(m=>{
rows.push([m.name,m.phone,m.email,m.points]);
});

let csv = rows.map(r=>r.join(",")).join("\n");

let blob = new Blob([csv], {type:"text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "members.csv";
a.click();
}

// =====================
loadMembers();

</script>

</body>
</html>
