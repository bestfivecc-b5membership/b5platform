<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5 Admin Panel V1.3 FIXED</title>

<style>
body{
font-family:Arial;
background:#f7f1e8;
margin:0;
padding:20px;
color:#5e4630;
}

.header{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.box{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#6b4e36;
color:white;
margin-top:5px;
margin-right:5px;
font-size:13px;
}

.small{
font-size:12px;
color:#888;
}

.member{
padding:10px;
border-bottom:1px solid #eee;
}

.copy-btn{
background:#444;
font-size:12px;
padding:5px 8px;
margin-left:5px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V1.3 FIXED</div>

<div class="box">
<b>Dashboard</b>
<div id="stats">Loading...</div>
</div>

<div class="box">
<b>Search Member</b>
<input id="searchInput" placeholder="Name / Phone / Email">

<button onclick="loadMembers()">Search</button>

<button onclick="selectAll()">Select All</button>
<button onclick="clearSelect()">Clear</button>

<button onclick="copySelectedPhones()">📱 Copy Selected Phones</button>
<button onclick="copySelectedEmails()">📧 Copy Selected Emails</button>
</div>

<div class="box">
<b>Members</b>
<div id="members">Loading...</div>
</div>

<div class="box hidden" id="detailBox">
<b>Member Detail</b>
<div id="detail"></div>
</div>

<script>

let membersData = [];
let selected = new Set();

// =====================
// API
// =====================
function API(){
return "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";
}

// =====================
// LOAD MEMBERS
// =====================
async function loadMembers(){

let res = await fetch(API()+"?mode=admin_members");
let data = await res.json();

membersData = data.members || [];

renderMembers(membersData);
}

// =====================
// RENDER MEMBERS
// =====================
function renderMembers(list){

let keyword = document.getElementById("searchInput").value.toLowerCase();

let container = document.getElementById("members");
container.innerHTML = "";

list.forEach(m => {

if(keyword &&
!(m.name.toLowerCase().includes(keyword) ||
m.phone.includes(keyword) ||
m.email.toLowerCase().includes(keyword)))
return;

let checked = selected.has(m.phone) ? "checked" : "";

container.innerHTML += `
<div class="member">

<input type="checkbox"
onchange="toggleSelect('${m.phone}')"
${checked}>

<b>${m.name}</b><br>

${m.phone}
<button onclick="copyText('${m.phone}')">Copy</button><br>

${m.email}
<button onclick="copyText('${m.email}')">Copy</button><br>

Points: ${m.points}<br>

<button onclick="viewMember(${m.row})">View</button>
<button onclick="editBasic(${m.row})">Edit</button>

</div>
`;
});

}

// =====================
// SELECT TOGGLE
// =====================
function toggleSelect(phone){

if(selected.has(phone)){
selected.delete(phone);
}else{
selected.add(phone);
}

renderMembers(membersData);
}

// =====================
// SELECT ALL
// =====================
function selectAll(){

selected = new Set(membersData.map(m => m.phone));

renderMembers(membersData);
}

// =====================
// CLEAR SELECT
// =====================
function clearSelect(){

selected.clear();

renderMembers(membersData);
}

// =====================
// COPY SINGLE
// =====================
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied");
}

// =====================
// COPY SELECTED PHONES
// =====================
function copySelectedPhones(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.phone);

if(arr.length === 0){
alert("No selection");
return;
}

navigator.clipboard.writeText(arr.join("\n"));

alert("Copied phones: " + arr.length);
}

// =====================
// COPY SELECTED EMAILS
// =====================
function copySelectedEmails(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.email);

if(arr.length === 0){
alert("No selection");
return;
}

navigator.clipboard.writeText(arr.join("\n"));

alert("Copied emails: " + arr.length);
}

// =====================
// VIEW MEMBER
// =====================
async function viewMember(row){

let res = await fetch(API()+"?mode=admin_member_detail&row="+row);
let data = await res.json();

let m = data.member;

document.getElementById("detailBox").classList.remove("hidden");

document.getElementById("detail").innerHTML = `
Name: ${m.name}<br>
Phone: ${m.phone}<br>
Email: ${m.email}<br>
Birthday: ${m.birthday}<br><br>

Points: ${m.points}<br>
Spin: ${m.spinStatus}<br>
Birthday: ${m.birthdayStatus}<br>
Promo: ${m.promoStatus}<br>
`;
}

// =====================
// EDIT MEMBER
// =====================
async function editBasic(row){

let old = membersData.find(m => m.row === row);
if(!old) return;

let name = prompt("Name", old.name);
let phone = prompt("Phone", old.phone);
let email = prompt("Email", old.email);

if(name === null || phone === null || email === null) return;

await fetch(API()
+ "?mode=admin_update_member"
+ "&row=" + row
+ "&name=" + encodeURIComponent(name || old.name)
+ "&phone=" + encodeURIComponent(phone || old.phone)
+ "&email=" + encodeURIComponent(email || old.email)
);

await loadMembers();

alert("Updated");
}

// =====================
// INIT
// =====================
loadMembers();

</script>

</body>
</html>
