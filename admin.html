<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5 Admin V4 FINAL</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
margin:0;
padding:12px;
color:#5e4630;
}

.header{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.box{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
box-sizing:border-box;
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}

button{
padding:7px 9px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6b4e36;
color:white;
font-size:12px;
}

.table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
font-size:12px;
}

.table th, .table td{
border-bottom:1px solid #eee;
padding:6px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.table th{
background:#f3ede6;
position:sticky;
top:0;
z-index:5;
}

.row-hover:hover{
background:#fff8ef;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-box{
background:white;
padding:15px;
width:90%;
max-width:420px;
border-radius:12px;
}

.modal input{
margin-bottom:8px;
}

.small{
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin V4 FINAL</div>

<div class="box">

<input id="searchInput" placeholder="Search name / phone / email">

<div class="toolbar">

<button onclick="selectAll()">☑ All</button>
<button onclick="clearSelect()">✖ Clear</button>

<button onclick="copyPhones()">📱 Phones</button>
<button onclick="copyEmails()">📧 Emails</button>
<button onclick="copyFull()">📋 Full</button>
<button onclick="exportCSV()">⬇ Export</button>

</div>

</div>

<div class="box">
<div id="table">Loading...</div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal" id="modal">

<div class="modal-box">

<h3>Member Detail</h3>

<input id="m_name" placeholder="Name">
<input id="m_phone" placeholder="Phone">
<input id="m_email" placeholder="Email">
<input id="m_points" placeholder="Points">

<div class="toolbar">

<button onclick="saveEdit()">💾 Save</button>
<button onclick="closeModal()">Close</button>

</div>

</div>

</div>

<script>

let data = [];
let selected = new Set();
let currentEditPhone = null;

const API = "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";

// ================= LOAD =================
async function load(){

let res = await fetch(API+"?mode=admin_members");
let json = await res.json();

data = json.members || [];

render();
}

// ================= RENDER =================
function render(){

let k = document.getElementById("searchInput").value.toLowerCase();

let html = `
<table class="table">
<tr>
<th></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Pts</th>
<th>Action</th>
</tr>
`;

data.forEach(m=>{

if(k &&
!(m.name.toLowerCase().includes(k) ||
m.phone.includes(k) ||
m.email.toLowerCase().includes(k)))
return;

html += `
<tr class="row-hover">

<td>
<input type="checkbox"
${selected.has(m.phone)?"checked":""}
onchange="toggle('${m.phone}')">
</td>

<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.email}</td>
<td>${m.points}</td>

<td>
<button onclick="view('${m.phone}')">View</button>
<button onclick="edit('${m.phone}')">Edit</button>
</td>

</tr>
`;
});

html += "</table>";

document.getElementById("table").innerHTML = html;
}

// ================= VIEW =================
function view(phone){

let m = data.find(x=>x.phone===phone);

alert(
"Name: "+m.name+"\n"+
"Phone: "+m.phone+"\n"+
"Email: "+m.email+"\n"+
"Points: "+m.points
);
}

// ================= EDIT =================
function edit(phone){

let m = data.find(x=>x.phone===phone);

currentEditPhone = phone;

document.getElementById("m_name").value = m.name;
document.getElementById("m_phone").value = m.phone;
document.getElementById("m_email").value = m.email;
document.getElementById("m_points").value = m.points;

document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// ================= SAVE =================
async function saveEdit(){

let payload = {
mode:"admin_update",
phone:currentEditPhone,
name:document.getElementById("m_name").value,
newPhone:document.getElementById("m_phone").value,
email:document.getElementById("m_email").value,
points:document.getElementById("m_points").value
};

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:new URLSearchParams(payload)
});

// update local
let m = data.find(x=>x.phone===currentEditPhone);

m.name = payload.name;
m.phone = payload.newPhone;
m.email = payload.email;
m.points = payload.points;

closeModal();
render();
}

// ================= TOGGLE =================
function toggle(phone){
if(selected.has(phone)) selected.delete(phone);
else selected.add(phone);
}

// ================= COPY =================
function copyPhones(){
let arr = data.filter(m=>selected.has(m.phone)).map(m=>m.phone);
navigator.clipboard.writeText(arr.join("\n"));
alert("Copied "+arr.length);
}

function copyEmails(){
let arr = data.filter(m=>selected.has(m.phone)).map(m=>m.email);
navigator.clipboard.writeText(arr.join("\n"));
alert("Copied "+arr.length);
}

function copyFull(){
let arr = data.filter(m=>selected.has(m.phone))
.map(m=>`${m.name} | ${m.phone} | ${m.email} | ${m.points}`);

navigator.clipboard.writeText(arr.join("\n"));
alert("Copied "+arr.length);
}

// ================= EXPORT =================
function exportCSV(){

let rows = [["Name","Phone","Email","Points"]];

data.forEach(m=>{
rows.push([m.name,m.phone,m.email,m.points]);
});

let csv = rows.map(r=>r.join(",")).join("\n");

let blob = new Blob([csv],{type:"text/csv"});
let url = URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="members.csv";
a.click();
}

// ================= SEARCH LIVE =================
document.getElementById("searchInput")
.addEventListener("input",render);

// ================= INIT =================
load();

</script>

</body>
</html>
