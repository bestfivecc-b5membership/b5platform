<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>B5 Admin Panel V4.6</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6f1e8;
color:#4b3b2a;
}

.header{
background:#6b4e36;
color:white;
padding:14px;
text-align:center;
font-weight:bold;
}

.container{
padding:10px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
background:white;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
white-space:nowrap;
}

th{
background:#f3ede6;
}

button{
padding:5px 10px;
font-size:12px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.btn{background:#6b4e36;color:white;}
.btn2{background:#28a745;color:white;}
.btn3{background:#ff9800;color:white;}

input{
padding:5px;
font-size:12px;
width:100%;
}

.topBar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
}

.editing input{
border:1px solid #6b4e36;
background:#fffaf5;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V4.6</div>

<div class="container">

<div class="topBar">
<div class="topBar">

<input
id="searchText"
placeholder="Search Name / Phone / Email"
style="
max-width:250px;
padding:6px;
font-size:12px;
">

<button class="btn" onclick="searchMembers()">
🔍 Search
</button>

<button class="btn" onclick="loadMembers()">
🔄 Refresh
</button>

<button class="btn2" onclick="copySelectedPhones()">
📱 Copy Selected Phones
</button>

<button class="btn2" onclick="copySelectedEmails()">
📧 Copy Selected Emails
</button>

<button class="btn3" onclick="exportCSV()">
⬇ Export
</button>

</div>

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Points</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>

let members = [];
let editMode = {};

// =========================
async function loadMembers(){

let res = await fetch(
"https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=admin_members"
);

let data = await res.json();
members = data.members || [];

render();

}

// =========================
function render(){

let html = "";

members.forEach((m,i)=>{

let isEdit = editMode[i];

html += `
<tr>
<td><input type="checkbox" class="chk" data-i="${i}"></td>

<td>
${isEdit
? `<input value="${m.name}" onchange="m.name=this.value">`
: m.name}
</td>

<td>
${isEdit
? `<input value="${m.phone}" onchange="m.phone=this.value">`
: m.phone}
</td>

<td>
${isEdit
? `<input value="${m.email}" onchange="m.email=this.value">`
: m.email}
</td>

<td>
${isEdit
? `<input value="${m.points}" onchange="m.points=this.value">`
: m.points}
</td>

<td>
${isEdit
? `
<button class="btn2" onclick="save(${i})">Save</button>
<button onclick="cancel(${i})">Cancel</button>
`
: `
<button class="btn" onclick="view(${m.row})">View</button>
<button class="btn2" onclick="edit(${i})">Edit</button>
`}
</td>

</tr>
`;

});

document.getElementById("tbody").innerHTML = html;

}
function searchMembers(){

let keyword =
document.getElementById("searchText")
.value
.toLowerCase()
.trim();

if(!keyword){

render();
return;

}

let filtered =
members.filter(m =>

(m.name||"")
.toLowerCase()
.includes(keyword)

||

(m.phone||"")
.toLowerCase()
.includes(keyword)

||

(m.email||"")
.toLowerCase()
.includes(keyword)

);

renderFiltered(filtered);

}
function renderFiltered(list){

let backup = members;

members = list;

render();

members = backup;

}
  
// =========================
function edit(i){
editMode[i] = true;
render();
}

// =========================
async function save(i){

let m = members[i];

let url =
`https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=admin_update_advanced`
+ `&row=${m.row}`
+ `&reward=${encodeURIComponent(m.reward||"")}`
+ `&points=${encodeURIComponent(m.points||0)}`
+ `&spinToken=${encodeURIComponent(m.spinToken||"")}`
+ `&spinStatus=${encodeURIComponent(m.spinStatus||"")}`
+ `&spinExpiry=${encodeURIComponent(m.spinExpiry||"")}`
+ `&birthdayToken=${encodeURIComponent(m.birthdayToken||"")}`
+ `&birthdayStatus=${encodeURIComponent(m.birthdayStatus||"")}`
+ `&birthdayExpiry=${encodeURIComponent(m.birthdayExpiry||"")}`
+ `&promoToken=${encodeURIComponent(m.promoToken||"")}`
+ `&promoStatus=${encodeURIComponent(m.promoStatus||"")}`
+ `&promoExpiry=${encodeURIComponent(m.promoExpiry||"")}`
+ `&promoCampaign=${encodeURIComponent(m.promoCampaign||"')}`
+ `&referral=${encodeURIComponent(m.referral||"")}`
+ `&cycleStart=${encodeURIComponent(m.cycleStart||"")}`;

await fetch(url);

await fetch(
`https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=admin_update_member`
+ `&row=${m.row}`
+ `&name=${encodeURIComponent(m.name)}`
+ `&phone=${encodeURIComponent(m.phone)}`
+ `&email=${encodeURIComponent(m.email)}`
);

editMode[i] = false;

await loadMembers();

alert("Updated");

}

// =========================
function cancel(i){
editMode[i] = false;
render();
}

// =========================
async function view(row){

let res = await fetch(
`https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=admin_member_detail&row=${row}`
);

let data = await res.json();

alert(
`${data.member.name}\n${data.member.phone}\n${data.member.email}\nPoints: ${data.member.points}`
);

}

// =========================
function toggleAll(el){
document.querySelectorAll(".chk").forEach(c=>{
c.checked = el.checked;
});
}

// =========================
function getSelected(){

let list = [];
document.querySelectorAll(".chk:checked").forEach(c=>{
let i = c.dataset.i;
list.push(members[i]);
});
return list;

}

// =========================
function copySelectedPhones(){
let list = getSelected().map(m=>m.phone).join("\n");
navigator.clipboard.writeText(list);
alert("Phones copied");
}

// =========================
function copySelectedEmails(){
let list = getSelected().map(m=>m.email).join("\n");
navigator.clipboard.writeText(list);
alert("Emails copied");
}

// =========================
function exportCSV(){

let csv = "Name,Phone,Email,Points\n";

members.forEach(m=>{
csv += `${m.name},${m.phone},${m.email},${m.points}\n`;
});

let blob = new Blob([csv], {type:"text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "members.csv";
a.click();

}

loadMembers();

</script>

</body>
</html>
