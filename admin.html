<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5 Admin Panel V1.2 FIXED</title>

<style>
body{
font-family:Arial;
background:#f7f1e8;
margin:0;
padding:20px;
color:#5e4630;
}

.header{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.box{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:12px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#6b4e36;
color:white;
margin-top:5px;
}

.small{
font-size:12px;
color:#888;
}

.member{
padding:10px;
border-bottom:1px solid #eee;
}

.copy-btn{
background:#444;
font-size:12px;
padding:5px 8px;
margin-left:5px;
}

.hidden{display:none;}

.badge{
font-size:11px;
background:#eee;
padding:2px 6px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V1.2 FIXED</div>

<div class="box">
<b>Dashboard</b>
<div id="stats">Loading...</div>
</div>

<div class="box">
<b>Search Member</b>
<input id="searchInput" placeholder="Name / Phone / Email">
<button onclick="loadMembers()">Search</button>
<button onclick="copyAllPhones()">📱 Copy Phones</button>
<button onclick="copyAllEmails()">📧 Copy Emails</button>
<button onclick="selectAll()">Select All</button>
<button onclick="clearSelect()">Clear</button>
<button onclick="copySelectedPhones()">Copy Selected Phones</button>
<button onclick="copySelectedEmails()">Copy Selected Emails</button>  
</div>

<div class="box">
<b>Members</b>
<div id="members"></div>
</div>

<div class="box hidden" id="detailBox">
<b>Member Detail</b>
<div id="detail"></div>
</div>

<script>

let membersData = [];

// =====================
// LOAD DASHBOARD
// =====================
async function loadDashboard(){

let res = await fetch(API()+"?mode=admin_get");
let data = await res.json();

document.getElementById("stats").innerHTML =
"Total Members: <b>" + (data.totalMembers || 0) + "</b>";
}

// =====================
// LOAD MEMBERS
// =====================
async function loadMembers(){

// 🔥 如果已有数据且没强制 refresh，就不重新 fetch
if(membersData.length > 0) return;

let res = await fetch(API()+"?mode=admin_members");
let data = await res.json();

membersData = data.members || [];

renderMembers(membersData);
}

async function refreshMembers(){

membersData = [];

await loadMembers();
}
  
// =====================
// RENDER MEMBERS (FIXED)
// =====================
function renderMembers(list){

let keyword = document.getElementById("searchInput").value.toLowerCase();

let container = document.getElementById("members");
container.innerHTML = ""; // 🔥 FIX UI RESET

list.forEach(m => {

if(keyword &&
!(m.name.toLowerCase().includes(keyword) ||
m.phone.includes(keyword) ||
m.email.toLowerCase().includes(keyword)))
return;

container.innerHTML += `
<div class="member">

<input type="checkbox" onchange="toggleSelect('${m.phone}')">

<b>${m.name}</b><br>
${m.phone}
<button class="copy-btn" onclick="copyText('${m.phone}')">Copy</button><br>

${m.email}
<button class="copy-btn" onclick="copyText('${m.email}')">Copy</button><br>

Points: <b>${m.points}</b><br>

<button onclick="viewMember(${m.row})">View</button>
<button onclick="editBasic(${m.row})">Edit</button>

</div>
`;
});

}

function toggleSelect(phone){

if(selected.has(phone)){
selected.delete(phone);
} else {
selected.add(phone);
}
}

function copySelectedPhones(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.phone);

navigator.clipboard.writeText(arr.join("\n"));

alert("Copied selected phones: " + arr.length);
}

function copySelectedEmails(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m => m.email);

navigator.clipboard.writeText(arr.join("\n"));

alert("Copied selected emails: " + arr.length);
}

function selectAll(){

membersData.forEach(m => selected.add(m.phone));

renderMembers(membersData);
}

function clearSelect(){
selected.clear();
renderMembers(membersData);
}
  
// =====================
// VIEW MEMBER (FIXED)
// =====================
async function viewMember(row){

let res = await fetch(API()+"?mode=admin_member_detail&row="+row);
let data = await res.json();

let m = data.member;

document.getElementById("detailBox").classList.remove("hidden");

document.getElementById("detail").innerHTML = `
Name: ${m.name}<br>
Phone: ${m.phone}<br>
Email: ${m.email}<br>
Birthday: ${m.birthday}<br><br>

Points: ${m.points}<br><br>

Spin: ${m.spinStatus}<br>
Birthday: ${m.birthdayStatus}<br>
Promo: ${m.promoStatus}<br><br>

Referral: ${m.referral}<br>
Cycle Start: ${m.cycleStart}<br>
`;
}

// =====================
// EDIT MEMBER (FIXED + SAFE)
// =====================
async function editBasic(row){

let old = membersData.find(m => m.row === row);
if(!old) return;

let name = prompt("Name (leave empty = keep)", old.name);
let phone = prompt("Phone (leave empty = keep)", old.phone);
let email = prompt("Email (leave empty = keep)", old.email);

if(name === null || phone === null || email === null) return;

name = name.trim() || old.name;
phone = phone.trim() || old.phone;
email = email.trim() || old.email;

await fetch(API()
+ "?mode=admin_update_member"
+ "&row=" + row
+ "&name=" + encodeURIComponent(name)
+ "&phone=" + encodeURIComponent(phone)
+ "&email=" + encodeURIComponent(email)
);

await new Promise(r => setTimeout(r, 500));

// 🔥 reload fresh state
await loadMembers();

// 🔥 refresh detail if open
if(!document.getElementById("detailBox").classList.contains("hidden")){
await viewMember(row);
}

alert("Updated");
}

// =====================
// COPY SINGLE
// =====================
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied");
}

// =====================
// BULK COPY
// =====================
function copyAllPhones(){
let all = membersData.map(m => m.phone).join("\n");
navigator.clipboard.writeText(all);
alert("All phones copied");
}

function copyAllEmails(){
let all = membersData.map(m => m.email).join("\n");
navigator.clipboard.writeText(all);
alert("All emails copied");
}

// =====================
// API BASE
// =====================
function API(){
return "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";
}

// =====================
loadDashboard();
loadMembers();

</script>

</body>
</html>
