<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5 Admin V3 CRM</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
margin:0;
padding:12px;
color:#5e4630;
}

.header{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.box{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
box-sizing:border-box;
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}

button{
padding:7px 9px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6b4e36;
color:white;
font-size:12px;
}

.table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
font-size:12px;
}

.table th, .table td{
border-bottom:1px solid #eee;
padding:6px;
text-align:left;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.table th{
background:#f3ede6;
position:sticky;
top:0;
z-index:5;
}

.row-hover:hover{
background:#fff8ef;
}

.pagination{
display:flex;
gap:5px;
flex-wrap:wrap;
margin-top:10px;
}

.page-btn{
padding:5px 8px;
background:#ddd;
border:none;
border-radius:5px;
cursor:pointer;
font-size:11px;
}

.page-btn.active{
background:#6b4e36;
color:white;
}

.small{
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin V3 CRM</div>

<div class="box">

<input id="searchInput" placeholder="Search name / phone / email">

<div class="toolbar">

<button onclick="selectAll()">☑ All</button>
<button onclick="clearSelect()">✖ Clear</button>

<button onclick="copyPhones()">📱 Phones</button>
<button onclick="copyEmails()">📧 Emails</button>
<button onclick="copyFull()">📋 Full</button>
<button onclick="exportCSV()">⬇ Export</button>

</div>

</div>

<div class="box">
<div id="table"></div>
<div id="pagination" class="pagination"></div>
<div class="small" id="info"></div>
</div>

<script>

let data = [];
let selected = new Set();
let page = 1;
let perPage = 20;

const API = "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";

// =====================
// LOAD
// =====================
async function load(){

document.getElementById("table").innerHTML="Loading...";

let res = await fetch(API+"?mode=admin_members");
let json = await res.json();

data = json.members || [];

render();
}

// =====================
// FILTER
// =====================
function filtered(){

let k = document.getElementById("searchInput").value.toLowerCase();

return data.filter(m =>
m.name.toLowerCase().includes(k) ||
m.phone.includes(k) ||
m.email.toLowerCase().includes(k)
);
}

// =====================
// RENDER TABLE
// =====================
function render(){

let list = filtered();

let start = (page-1)*perPage;
let end = start + perPage;

let pageData = list.slice(start,end);

let html = `
<table class="table">
<tr>
<th></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Pts</th>
</tr>
`;

pageData.forEach(m=>{

html += `
<tr class="row-hover">

<td>
<input type="checkbox"
${selected.has(m.phone)?"checked":""}
onchange="toggle('${m.phone}')">
</td>

<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.email}</td>
<td>${m.points}</td>

</tr>
`;
});

html += "</table>";

document.getElementById("table").innerHTML = html;

renderPagination(list);
}

// =====================
// PAGINATION
// =====================
function renderPagination(list){

let pages = Math.ceil(list.length / perPage);

let html = "";

for(let i=1;i<=pages;i++){

html += `
<button class="page-btn ${i===page?'active':''}"
onclick="goto(${i})">${i}</button>
`;
}

document.getElementById("pagination").innerHTML = html;

document.getElementById("info").innerText =
`Total: ${list.length} | Page ${page} / ${pages}`;
}

function goto(p){
page = p;
render();
}

// =====================
// SEARCH LIVE
// =====================
document.getElementById("searchInput")
.addEventListener("input", ()=> {
page = 1;
render();
});

// =====================
// SELECT
// =====================
function toggle(phone){
if(selected.has(phone)) selected.delete(phone);
else selected.add(phone);
render();
}

function selectAll(){
filtered().forEach(m=>selected.add(m.phone));
render();
}

function clearSelect(){
selected.clear();
render();
}

// =====================
// COPY
// =====================
function copyPhones(){
let arr = data.filter(m=>selected.has(m.phone)).map(m=>m.phone);
navigator.clipboard.writeText(arr.join("\n"));
alert("Copied phones: "+arr.length);
}

function copyEmails(){
let arr = data.filter(m=>selected.has(m.phone)).map(m=>m.email);
navigator.clipboard.writeText(arr.join("\n"));
alert("Copied emails: "+arr.length);
}

function copyFull(){
let arr = data.filter(m=>selected.has(m.phone))
.map(m=>`${m.name} | ${m.phone} | ${m.email} | ${m.points}`);

navigator.clipboard.writeText(arr.join("\n"));
alert("Copied: "+arr.length);
}

// =====================
// EXPORT
// =====================
function exportCSV(){

let rows = [["Name","Phone","Email","Points"]];

data.forEach(m=>{
rows.push([m.name,m.phone,m.email,m.points]);
});

let csv = rows.map(r=>r.join(",")).join("\n");

let blob = new Blob([csv],{type:"text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "members.csv";
a.click();
}

// =====================
load();

</script>

</body>
</html>
