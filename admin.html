<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>B5 Admin Panel V5 Stable</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f6f1e8;
color:#3d2f22;
}

.header{
background:#6b4e36;
color:#fff;
padding:14px;
text-align:center;
font-weight:bold;
}

.container{
padding:10px;
overflow-x:auto;
}

/* TOP BAR */
.topBar{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
align-items:center;
}

input,button{
padding:6px;
font-size:12px;
border-radius:6px;
border:1px solid #ddd;
}

button{
cursor:pointer;
border:none;
}

.btn{background:#6b4e36;color:white;}
.btn2{background:#28a745;color:white;}
.btn3{background:#ff9800;color:white;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
min-width:900px;
background:white;
}

th,td{
padding:10px;
font-size:13px;
border-bottom:1px solid #eee;
white-space:nowrap;
}

th{
background:#f3ede6;
position:sticky;
top:0;
}

.editInput{
width:100%;
padding:5px;
font-size:12px;
border:1px solid #ccc;
border-radius:4px;
}

.smallBtn{
padding:4px 6px;
font-size:11px;
margin:2px;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V5 (Stable)</div>

<div class="container">

<div class="topBar">

<input id="searchBox" placeholder="Search name / phone / email">

<button class="btn" onclick="search()">Search</button>
<button class="btn" onclick="load()">Refresh</button>
<button class="btn2" onclick="toggleEdit()">Edit Mode</button>

<button class="btn2" onclick="copySelectedPhones()">Copy Phones</button>
<button class="btn2" onclick="copySelectedEmails()">Copy Emails</button>
<button class="btn3" onclick="exportCSV()">Export</button>

</div>

<table>
<thead>
<tr>
<th><input type="checkbox" onclick="toggleAll(this)"></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>

let members = [];
let filtered = [];
let editMode = false;

const API =
"https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";

// =========================
async function load(){

document.getElementById("tbody").innerHTML =
"<tr><td colspan='5'>Loading...</td></tr>";

let res = await fetch(API + "?mode=admin_members");

let data = await res.json();

members = data.members || [];
filtered = members;

render();

}

// =========================
function render(){

let html = "";

filtered.forEach((m,i)=>{

html += `
<tr>

<td><input type="checkbox" class="chk" data-i="${i}"></td>

<td>
${editMode
? `<input class="editInput" value="${m.name}" onchange="m.name=this.value">`
: m.name}
</td>

<td>
${editMode
? `<input class="editInput" value="${m.phone}" onchange="m.phone=this.value">`
: m.phone}
</td>

<td>
${editMode
? `<input class="editInput" value="${m.email}" onchange="m.email=this.value">`
: m.email}
</td>

<td>
${editMode
? `<button class="btn2 smallBtn" onclick="save(${i})">Save</button>`
: `<span style="color:#888">View</span>`}
</td>

</tr>
`;

});

document.getElementById("tbody").innerHTML = html;

}

// =========================
function toggleEdit(){
editMode = !editMode;
render();
}

// =========================
async function save(i){

let m = filtered[i];

let url =
API
+ "?mode=admin_update_member"
+ `&row=${m.row}`
+ `&name=${encodeURIComponent(m.name)}`
+ `&phone=${encodeURIComponent(m.phone)}`
+ `&email=${encodeURIComponent(m.email)}`;

await fetch(url);

alert("Saved");

load();

}

// =========================
function search(){

let k = document.getElementById("searchBox").value.toLowerCase();

filtered = members.filter(m =>
(m.name||"").toLowerCase().includes(k) ||
(m.phone||"").includes(k) ||
(m.email||"").toLowerCase().includes(k)
);

render();

}

// =========================
function toggleAll(el){

document.querySelectorAll(".chk").forEach(c=>{
c.checked = el.checked;
});

}

// =========================
function copySelectedPhones(){

let list = [];

document.querySelectorAll(".chk:checked").forEach(c=>{
let i = c.dataset.i;
list.push(filtered[i].phone);
});

navigator.clipboard.writeText(list.join("\n"));
alert("Phones copied");

}

// =========================
function copySelectedEmails(){

let list = [];

document.querySelectorAll(".chk:checked").forEach(c=>{
let i = c.dataset.i;
list.push(filtered[i].email);
});

navigator.clipboard.writeText(list.join("\n"));
alert("Emails copied");

}

// =========================
function exportCSV(){

let csv = "Name,Phone,Email\n";

members.forEach(m=>{
csv += `${m.name},${m.phone},${m.email}\n`;
});

let blob = new Blob([csv], {type:"text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "members.csv";
a.click();

}

load();

</script>

</body>
</html>
