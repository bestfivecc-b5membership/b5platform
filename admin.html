<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5 Admin V1.5 CRM PRO</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
margin:0;
padding:12px;
color:#5e4630;
}

.header{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.box{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:6px;
}

button{
padding:7px 9px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6b4e36;
color:white;
font-size:12px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
box-sizing:border-box;
}

.table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
font-size:12px;
}

.table th, .table td{
border-bottom:1px solid #eee;
padding:6px;
text-align:left;
word-wrap:break-word;
overflow:hidden;
}

.table th{
background:#f3ede6;
position:sticky;
top:0;
z-index:1;
}

.checkbox{
transform:scale(1.1);
}

.expand{
background:#faf7f3;
font-size:12px;
padding:8px;
}

.small{
font-size:11px;
color:#888;
}

.loading{
padding:10px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="header">📊 B5 Admin Panel V1.5</div>

<div class="box">

<input id="searchInput" placeholder="Search name / phone / email">

<div class="toolbar">

<button onclick="loadMembers()">Search</button>
<button onclick="selectAll()">Select All</button>
<button onclick="clearSelect()">Clear</button>

<button onclick="copySelectedPhones()">Copy Phones</button>
<button onclick="copySelectedEmails()">Copy Emails</button>
<button onclick="copyAllInfo()">Copy ALL</button>
<button onclick="exportCSV()">Export</button>

</div>

</div>

<div class="box">

<div id="members">Loading...</div>

</div>

<script>

let membersData = [];
let selected = new Set();

function API(){
return "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec";
}

// =====================
async function loadMembers(){

document.getElementById("members").innerHTML =
"<div class='loading'>Loading...</div>";

let res = await fetch(API()+"?mode=admin_members");
let data = await res.json();

membersData = data.members || [];

renderTable(membersData);
}

// =====================
function renderTable(list){

let keyword = document.getElementById("searchInput").value.toLowerCase();

let html = `
<table class="table">
<tr>
<th></th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Pts</th>
<th></th>
</tr>
`;

list.forEach(m => {

if(keyword &&
!(m.name.toLowerCase().includes(keyword) ||
m.phone.includes(keyword) ||
m.email.toLowerCase().includes(keyword)))
return;

html += `
<tr>

<td>
<input class="checkbox" type="checkbox"
onchange="toggle('${m.phone}')"
${selected.has(m.phone) ? "checked" : ""}>
</td>

<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.email}</td>
<td>${m.points}</td>

<td>
<button onclick="toggleExpand(${m.row})">View</button>
</td>

</tr>

<tr id="row-${m.row}" style="display:none">
<td colspan="6" class="expand">
<b>Detail:</b><br>
Name: ${m.name}<br>
Phone: ${m.phone}<br>
Email: ${m.email}<br>
Points: ${m.points}<br>

<button onclick="editMember(${m.row})">Edit</button>
</td>
</tr>
`;
});

html += "</table>";

document.getElementById("members").innerHTML = html;
}

// =====================
function toggle(phone){

if(selected.has(phone)) selected.delete(phone);
else selected.add(phone);

renderTable(membersData);
}

// =====================
function selectAll(){
selected = new Set(membersData.map(m => m.phone));
renderTable(membersData);
}

// =====================
function clearSelect(){
selected.clear();
renderTable(membersData);
}

// =====================
function copySelectedPhones(){
let arr = membersData.filter(m => selected.has(m.phone)).map(m => m.phone);
navigator.clipboard.writeText(arr.join("\n"));
alert("Phones copied: " + arr.length);
}

// =====================
function copySelectedEmails(){
let arr = membersData.filter(m => selected.has(m.phone)).map(m => m.email);
navigator.clipboard.writeText(arr.join("\n"));
alert("Emails copied: " + arr.length);
}

// =====================
function copyAllInfo(){

let arr = membersData
.filter(m => selected.has(m.phone))
.map(m =>
`${m.name} | ${m.phone} | ${m.email} | ${m.points}`
);

navigator.clipboard.writeText(arr.join("\n"));
alert("Copied full info: " + arr.length);
}

// =====================
function exportCSV(){

let rows = [["Name","Phone","Email","Points"]];

membersData.forEach(m=>{
rows.push([m.name,m.phone,m.email,m.points]);
});

let csv = rows.map(r=>r.join(",")).join("\n");

let blob = new Blob([csv], {type:"text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "members.csv";
a.click();
}

// =====================
function toggleExpand(row){

let el = document.getElementById("row-"+row);
if(!el) return;

el.style.display =
(el.style.display==="none") ? "table-row" : "none";
}

// =====================
async function editMember(row){

let m = membersData.find(x=>x.row===row);
if(!m) return;

let name = prompt("Name", m.name);
let phone = prompt("Phone", m.phone);
let email = prompt("Email", m.email);

await fetch(API()
+ "?mode=admin_update_member"
+ "&row="+row
+ "&name="+encodeURIComponent(name||m.name)
+ "&phone="+encodeURIComponent(phone||m.phone)
+ "&email="+encodeURIComponent(email||m.email)
);

await loadMembers();

alert("Updated");
}

// =====================
loadMembers();

</script>

</body>
</html>
