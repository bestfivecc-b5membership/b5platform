<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Member Dashboard</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
padding:20px;
color:#5e4630;
}

.box{
background:white;
padding:20px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:10px;
border:none;
background:#6b4e36;
color:white;
border-radius:10px;
cursor:pointer;
width:100%;
}

.section-title{
font-weight:bold;
margin-bottom:8px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.small{
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="box">
<h2>👤 Member Lookup</h2>

<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<button onclick="search()">Search</button>
</div>

<div id="result"></div>

<script>

function renderCatalog(catalog, points){

if(!catalog || !catalog.length){
return "<div class='box'>No rewards</div>";
}

let html = "<div class='box'><h3>🎁 Reward Catalog</h3>";

catalog
.sort((a,b)=>a.points-b.points)
.forEach(item=>{

const can =
points >= item.points;

html += `
<div class="row">
<div>
<b>${item.reward}</b><br>
<span class="small">${item.points} Points</span>
</div>
<div>
${can
? "✅ Available"
: "❌ Need " + (item.points - points)
}
</div>
</div>
`;

});

html += "</div>";

return html;
}

async function search(){

let phone=document.getElementById("phone").value.trim();
let email=document.getElementById("email").value.trim();

if(!phone && !email){
alert("Enter phone or email");
return;
}

let url = "https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=member";

if(phone){
url += "&phone=" + encodeURIComponent(phone);
}

if(email){
url += "&email=" + encodeURIComponent(email);
}

let res = await fetch(url);
let data = await res.json();

if(data.status !== "ok"){
document.getElementById("result").innerHTML =
"<div class='box'>No member found</div>";
return;
}

let m = data.data;

document.getElementById("result").innerHTML = `

<div class="box">
<b>Name:</b> ${m.profile.name}<br>
<b>Phone:</b> ${m.profile.phone}<br>
<b>Email:</b> ${m.profile.email}<br>
<b>Member Since:</b> ${m.profile.memberSince}
</div>

<div class="box">
<b>Points:</b> ${m.points.balance}<br>
<b>Cycle Start:</b> ${m.points.cycleStart}
</div>

<div class="box">
<b>Reward:</b> ${m.reward.name} (${m.reward.status})
</div>

<div class="box">
<b>Birthday:</b> ${m.birthdayReward.status}
</div>

<div class="box">
<b>Promo:</b> ${m.promoReward.status}
</div>

<div class="box">
<b>Referral:</b> ${m.referral.referredBy || "-"}
</div>

`;

// render catalog
document.getElementById("result").innerHTML +=
renderCatalog(m.catalog, m.points.balance);

}

</script>

</body>
</html>
