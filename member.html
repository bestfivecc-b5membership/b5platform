<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Member Dashboard V3 FINAL</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
padding:20px;
color:#5e4630;
}

.box{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

input,button{
width:100%;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

button{
border:none;
background:#6b4e36;
color:white;
cursor:pointer;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.small{
font-size:12px;
color:#888;
}

.redeem-btn{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

.redeem-btn:disabled{
background:#ccc;
cursor:not-allowed;
}

.click{
cursor:pointer;
font-weight:bold;
}

.hidden{
display:none;
}

.loading{
text-align:center;
padding:20px;
font-weight:bold;
}

.copy-btn{
margin-top:6px;
padding:6px;
font-size:12px;
background:#444;
}

</style>
</head>

<body>

<div class="box" id="searchBox">

<h2>👤 Member Lookup</h2>

<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<button onclick="search()">Search</button>

</div>

<div id="result"></div>

<script>

function toggle(id){
const el=document.getElementById(id);
if(!el) return;
el.classList.toggle("hidden");
}

// =====================
// COPY
// =====================

function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied");
}

// =====================
// REDEEM
// =====================

async function redeem(phone, reward, points){

const url =
"https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec"
+ "?mode=redeem"
+ "&phone=" + encodeURIComponent(phone)
+ "&reward=" + encodeURIComponent(reward)
+ "&points=" + encodeURIComponent(points);

let res=await fetch(url);
let data=await res.json();

alert(data.status==="ok"
? "Redeemed! Remaining: "+data.remaining
: "Failed: "+data.status
);

search();
}

// =====================
// CATALOG
// =====================

function renderCatalog(catalog, points, phone){

if(!catalog) return "";

let html="<div class='box'><h3>🎁 Reward Catalog</h3>";

catalog.sort((a,b)=>a.points-b.points).forEach(item=>{

const can = points >= item.points;

html+=`
<div class="row">
<div>
<b>${item.reward}</b><br>
<span class="small">${item.points} pts</span>
</div>

<div>
<button class="redeem-btn"
${can ? "" : "disabled"}
onclick="redeem('${phone}','${item.reward}',${item.points})">
Redeem
</button>
</div>

</div>
`;
});

html+="</div>";
return html;
}
// =====================
// REDEEM HISTORY
// =====================

function renderHistory(history){

if(!history || history.length===0){

return `
<div class="box">
<h3>📜 Redeem History</h3>
No redemption yet
</div>
`;
}

let html=`
<div class="box">
<h3>📜 Redeem History</h3>
`;

history.forEach(item=>{

html+=`
<div class="row">

<div>

<b>${item.reward}</b><br>

<span class="small">
${item.date}
</span>

</div>

<div>

-${item.points} pts

</div>

</div>
`;
});

html+="</div>";

return html;
}
// =====================
// SEARCH
// =====================

async function search(){

let phone=document.getElementById("phone").value.trim();
let email=document.getElementById("email").value.trim();

if(!phone && !email){
alert("Enter phone or email");
return;
}

document.getElementById("result").innerHTML=
"<div class='loading'>Searching...</div>";

let url="https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=member";

if(phone) url+="&phone="+phone;
if(email) url+="&email="+email;

let res=await fetch(url);
let data=await res.json();

if(data.status!=="ok"){
document.getElementById("result").innerHTML=
"<div class='box'>No member found</div>";
return;
}

document.getElementById("searchBox").style.display="none";

let m=data.data;

function tokenBlock(label, token){
if(!token) return "-";
return token + 
`<button class="copy-btn" onclick="copyText('${token}')">Copy</button>`;
}

document.getElementById("result").innerHTML=`

<div class="box">
<button onclick="location.reload()">🔍 New Search</button>
</div>

<div class="box">

<h2>${m.profile.name}</h2>

${m.profile.phone}<br>
${m.profile.email}

</div>

<div class="box">

<h3>💰 Current Points</h3>

<div style="font-size:34px;font-weight:bold;">
${m.points.balance}
</div>

Cycle Start: ${m.points.cycleStart}<br>
Expiry: ${m.points.expiry}

</div>

`;

document.getElementById("result").innerHTML +=
renderCatalog(
m.catalog,
m.points.balance,
m.profile.phone
);
document.getElementById("result").innerHTML +=
renderHistory(
m.history
);
// =====================
// REWARD BLOCKS
// =====================

document.getElementById("result").innerHTML += `

<div class="box">

<div class="click" onclick="toggle('spinReward')">
🎁 Spin Reward ▶
</div>

<div id="spinReward" class="hidden">

Reward: ${m.reward.name || "-"}<br>
Token: ${tokenBlock("spin", m.reward.token)}<br>
Status: ${m.reward.status || "-"}<br>
Expiry: ${m.reward.expiry || "-"}

</div>

</div>

<div class="box">

<div class="click" onclick="toggle('birthdayReward')">
🎂 Birthday Reward ▶
</div>

<div id="birthdayReward" class="hidden">

Token: ${tokenBlock("birthday", m.birthdayReward.token)}<br>
Status: ${m.birthdayReward.status || "-"}<br>
Expiry: ${m.birthdayReward.expiry || "-"}

</div>

</div>

<div class="box">

<div class="click" onclick="toggle('promoReward')">
🔥 Promo Reward ▶
</div>

<div id="promoReward" class="hidden">

Campaign: ${m.promoReward.campaign || "-"}<br>
Token: ${tokenBlock("promo", m.promoReward.token)}<br>
Status: ${m.promoReward.status || "-"}<br>
Expiry: ${m.promoReward.expiry || "-"}

</div>

</div>

<div class="box">

<div class="click" onclick="toggle('referral')">
👥 Referral ▶
</div>

<div id="referral" class="hidden">

Referred By: ${m.referral.referredBy || "-"}

</div>

</div>

`;

}

</script>

</body>
</html>
