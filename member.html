<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B5 Member Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f7f1e8,
#efe4d3,
#e5d5bf
);

min-height:100vh;
padding:25px;
color:#5e4630;

}

.container{
max-width:1000px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.title{
font-size:38px;
font-weight:bold;
margin-bottom:8px;
}

.subtitle{
color:#82654a;
}

.card{

background:rgba(255,255,255,0.75);

backdrop-filter:blur(10px);

border-radius:20px;

padding:25px;

margin-bottom:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

}

input{

width:100%;

padding:14px;

border-radius:12px;

border:1px solid #ddd;

margin-bottom:12px;

font-size:15px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#6b4e36;

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{
opacity:.9;
}

.section{

margin-bottom:18px;

}

.section h3{

margin-bottom:10px;

font-size:20px;

}

.info{

line-height:1.9;

}

.points{

font-size:34px;
font-weight:bold;

}

.footer{

text-align:center;

margin-top:30px;

font-size:13px;

color:#82654a;

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="title">
👤 Member Dashboard
</div>

<div class="subtitle">
Lookup by Phone Number or Email
</div>

</div>

<div class="card">

<input
id="phone"
placeholder="Phone Number">

<input
id="email"
placeholder="Email Address">

<button onclick="search()">
Search Member
</button>

</div>

<div id="result"></div>

<div class="footer">

B5 Cuisine Cafe © 2026

</div>

</div>

<script>

async function search(){

const phone =
document.getElementById("phone")
.value.trim();

const email =
document.getElementById("email")
.value.trim();

if(!phone && !email){

alert(
"Enter phone or email"
);

return;
}

let url =
"https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=member";

if(phone){

url +=
"&phone=" +
encodeURIComponent(phone);

}

if(email){

url +=
"&email=" +
encodeURIComponent(email);

}

const res =
await fetch(url);

const data =
await res.json();

if(data.status !== "ok"){

document.getElementById("result")
.innerHTML =

`<div class="card">
Member not found
</div>`;

return;
}

const m =
data.data;

document.getElementById("result")
.innerHTML = `

<div class="card">

<div class="section">

<h3>
👤 Profile
</h3>

<div class="info">

Name:
${m.profile.name}<br>

Phone:
${m.profile.phone}<br>

Email:
${m.profile.email}<br>

Birthday:
${m.profile.birthday}<br>

Member Since:
${m.profile.memberSince}

</div>

</div>

</div>

<div class="card">

<h3>
💰 Points Wallet
</h3>

<div class="points">
${m.points.balance}
</div>

<div class="info">

Points Cycle Start:
${m.points.cycleStart}

</div>

</div>

<div class="card">

<h3>
🎁 Spin Reward
</h3>

<div class="info">

Reward:
${m.reward.name}<br>

Token:
${m.reward.token}<br>

Status:
${m.reward.status}<br>

Expiry:
${m.reward.expiry}

</div>

</div>

<div class="card">

<h3>
🎂 Birthday Reward
</h3>

<div class="info">

Token:
${m.birthdayReward.token}<br>

Status:
${m.birthdayReward.status}<br>

Expiry:
${m.birthdayReward.expiry}

</div>

</div>

<div class="card">

<h3>
🔥 Promo Reward
</h3>

<div class="info">

Campaign:
${m.promoReward.campaign}<br>

Token:
${m.promoReward.token}<br>

Status:
${m.promoReward.status}<br>

Expiry:
${m.promoReward.expiry}

</div>

</div>

<div class="card">

<h3>
👥 Referral
</h3>

<div class="info">

Referred By:
${m.referral.referredBy || "-"}

</div>

</div>

`;

}

</script>

</body>
</html>
