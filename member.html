<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Member Dashboard</title>

<style>
body{
font-family:Arial;
background:#f7f1e8;
padding:20px;
color:#5e4630;
}

.box{
background:white;
padding:20px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:10px;
border:none;
background:#6b4e36;
color:white;
border-radius:10px;
cursor:pointer;
width:100%;
}

.section-title{
font-weight:bold;
margin-bottom:8px;
}
</style>
</head>

<body>

<div class="box">
<h2>👤 Member Lookup</h2>

<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<button onclick="search()">Search</button>
</div>

<div id="result"></div>

<script>

async function search(){

let phone=document.getElementById("phone").value.trim();
let email=document.getElementById("email").value.trim();

if(!phone && !email){
alert("Enter phone or email");
return;
}

let url = "YOUR_APPS_SCRIPT_URL" + "?mode=member";

if(phone){
url += "&phone=" + encodeURIComponent(phone);
}

if(email){
url += "&email=" + encodeURIComponent(email);
}

let res = await fetch(url);
let data = await res.json();

console.log(data);

if(data.status !== "ok"){
document.getElementById("result").innerHTML =
"No member found";
return;
}

let m = data.data;

document.getElementById("result").innerHTML = `
<div class="box">
<b>Name:</b> ${m.profile.name}<br>
<b>Phone:</b> ${m.profile.phone}<br>
<b>Email:</b> ${m.profile.email}
</div>

<div class="box">
<b>Points:</b> ${m.points.balance}
</div>

<div class="box">
<b>Reward:</b> ${m.reward.lastReward} (${m.reward.status})
</div>

<div class="box">
<b>Birthday:</b> ${m.birthday.status}
</div>

<div class="box">
<b>Promo:</b> ${m.promo.status}
</div>

<div class="box">
<b>Referral:</b> ${m.referral.referredBy || "-"}
</div>
`;

}

</script>

</body>
</html>
