<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Member Dashboard V2</title>

<style>

body{
font-family:Arial;
background:#f7f1e8;
padding:20px;
color:#5e4630;
}

.box{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px;
border:none;
background:#6b4e36;
color:white;
border-radius:10px;
cursor:pointer;
width:100%;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.small{
font-size:12px;
color:#888;
}

.click{
cursor:pointer;
font-weight:bold;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="box">
<h2>👤 Member Lookup</h2>

<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<button onclick="search()">Search</button>
</div>

<div id="result"></div>

<script>

function toggle(id){
const el=document.getElementById(id);
el.style.display =
el.style.display==="none"?"block":"none";
}

// =====================
// REWARD CATALOG
// =====================

function renderCatalog(catalog, points){

if(!catalog || !catalog.length){
return "<div class='box'>No rewards</div>";
}

let html="<div class='box'><h3>🎁 Reward Catalog</h3>";

catalog
.sort((a,b)=>a.points-b.points)
.forEach(item=>{

const can = points >= item.points;

html+=`
<div class="row">
<div>
<b>${item.reward}</b><br>
<span class="small">${item.points} Points</span>
</div>
<div>
${can
? "✅ Available"
: "❌ -" + (item.points - points)
}
</div>
</div>
`;
});

html+="</div>";
return html;
}

// =====================
// SEARCH
// =====================

async function search(){

let phone=document.getElementById("phone").value.trim();
let email=document.getElementById("email").value.trim();

if(!phone && !email){
alert("Enter phone or email");
return;
}

let url="https://script.google.com/macros/s/AKfycbyw_wc2HirKbFq6Yn6sL2YC_SpXZb0J5K2Kd-k0uKYfRTwhXHg6sy_RbFzSYV6w8NCp5A/exec?mode=member";

if(phone) url+="&phone="+encodeURIComponent(phone);
if(email) url+="&email="+encodeURIComponent(email);

let res=await fetch(url);
let data=await res.json();

if(data.status!=="ok"){
document.getElementById("result").innerHTML=
"<div class='box'>No member found</div>";
return;
}

let m=data.data;

document.getElementById("result").innerHTML=`

<div class="box">

<div class="click" onclick="toggle('profile')">
👤 Profile ▶
</div>

<div id="profile" class="hidden">

Name: ${m.profile.name}<br>
Phone: ${m.profile.phone}<br>
Email: ${m.profile.email}<br>
Birthday: ${m.profile.birthday}<br>
Member Since: ${m.profile.memberSince}

</div>

</div>

<div class="box">

<div class="click" onclick="toggle('points')">
💰 Points ▶
</div>

<div id="points" class="hidden">

Current: ${m.points.balance}<br>
Cycle Start: ${m.points.cycleStart}<br>
Expiry: ${m.points.expiry}

</div>

</div>

`;

// catalog (IMPORTANT POSITION UNDER POINTS)
document.getElementById("result").innerHTML +=
renderCatalog(m.catalog, m.points.balance);

document.getElementById("result").innerHTML += `

<div class="box">

<div class="click" onclick="toggle('spin')">
🎁 Spin Reward ▶
</div>

<div id="spin" class="hidden">
Reward: ${m.reward.name}<br>
Token: ${m.reward.token}<br>
Status: ${m.reward.status}<br>
Expiry: ${m.reward.expiry}
</div>

</div>

<div class="box">

<div class="click" onclick="toggle('birthday')">
🎂 Birthday ▶
</div>

<div id="birthday" class="hidden">
Token: ${m.birthdayReward.token}<br>
Status: ${m.birthdayReward.status}<br>
Expiry: ${m.birthdayReward.expiry}
</div>

</div>

<div class="box">

<div class="click" onclick="toggle('promo')">
🔥 Promo ▶
</div>

<div id="promo" class="hidden">
Campaign: ${m.promoReward.campaign}<br>
Token: ${m.promoReward.token}<br>
Status: ${m.promoReward.status}<br>
Expiry: ${m.promoReward.expiry}
</div>

</div>

<div class="box">

<div class="click" onclick="toggle('ref')">
👥 Referral ▶
</div>

<div id="ref" class="hidden">
${m.referral.referredBy || "-"}
</div>

</div>

`;

}

</script>

</body>
</html>
