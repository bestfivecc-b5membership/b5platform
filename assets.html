<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Asset Library</title>

<style>
body{
font-family:Arial;
background:#f7f1e8;
padding:30px;
color:#5e4630;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:#fff;
border-radius:14px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:10px;
font-size:12px;
}

button{
width:100%;
padding:8px;
border:none;
background:#5e4630;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🖼️ Asset Library</h2>

<div class="grid">

<!-- Example -->
<div class="card">
<img src="assets/images/karaage.png">
<div class="info">karaage.png</div>
<button onclick="copy('assets/images/karaage.png')">Copy URL</button>
</div>

<div class="card">
<img src="assets/images/salad.png">
<div class="info">salad.png</div>
<button onclick="copy('assets/images/salad.png')">Copy URL</button>
</div>

</div>

<script>
function copy(path){
const url = window.location.origin + "/" + path;
navigator.clipboard.writeText(url);
alert("Copied:\n" + url);
}
</script>

</body>
</html>
