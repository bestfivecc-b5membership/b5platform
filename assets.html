<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B5 Asset Library</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#f7f1e8,
#efe4d3,
#e5d5bf
);
padding:30px;
color:#5e4630;
min-height:100vh;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:40px;
margin-bottom:10px;
}

.header p{
color:#82654a;
}

.search{
max-width:500px;
margin:20px auto;
}

.search input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
display:block;
}

.info{
padding:15px;
}

.filename{
font-size:14px;
font-weight:bold;
margin-bottom:10px;
word-break:break-word;
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#6b4e36;
color:white;
}

.footer{
text-align:center;
margin-top:40px;
font-size:13px;
color:#82654a;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

</style>
</head>
<body>

<div class="header">
<h1>🖼️ Asset Library</h1>
<p>Auto Sync From GitHub Images Folder</p>
</div>

<div class="search">
<input
type="text"
id="search"
placeholder="Search image..."
onkeyup="filterImages()">
</div>

<div id="loading" class="loading">
Loading images...
</div>

<div class="grid" id="gallery"></div>

<div class="footer">
B5 Asset Library © 2026
</div>

<script>

const OWNER = "bestfivecc-b5membership";
const REPO = "b5platform";
const FOLDER = "assets/images";

const gallery = document.getElementById("gallery");

async function loadImages(){

try{

const api =
`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}`;

const response = await fetch(api);

const files = await response.json();

document.getElementById("loading").style.display="none";

files.forEach(file=>{

const ext = file.name.toLowerCase();

if(
ext.endsWith(".png") ||
ext.endsWith(".jpg") ||
ext.endsWith(".jpeg") ||
ext.endsWith(".webp") ||
ext.endsWith(".gif")
){

const imageUrl =
`https://app.b5membership.com/assets/images/${file.name}`;

const card = document.createElement("div");

card.className = "card";

card.innerHTML = `
<img src="${imageUrl}" loading="lazy">

<div class="info">

<div class="filename">
${file.name}
</div>

<button class="btn"
onclick="copyUrl('${imageUrl}')">
Copy URL
</button>

</div>
`;

gallery.appendChild(card);

}

});

}catch(err){

document.getElementById("loading").innerHTML =
"Unable to load images.";

console.error(err);

}

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert("Copied URL:\\n\\n" + url);

}

function filterImages(){

const keyword =
document.getElementById("search")
.value
.toLowerCase();

const cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

const text =
card.querySelector(".filename")
.innerText
.toLowerCase();

card.style.display =
text.includes(keyword)
? "block"
: "none";

});

}

loadImages();

</script>

</body>
</html>
