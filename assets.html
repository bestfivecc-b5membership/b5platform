<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B5 Asset Library</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#f7f1e8,
#efe4d3,
#e5d5bf
);
padding:30px;
color:#5e4630;
min-height:100vh;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:42px;
margin-bottom:10px;
}

.header p{
color:#82654a;
}

.search{
max-width:500px;
margin:20px auto 40px;
}

.search input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:15px;
}

.section{
margin-bottom:50px;
}

.section-title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
padding-bottom:8px;
border-bottom:2px solid rgba(94,70,48,.15);
}

.count{
font-size:14px;
font-weight:normal;
color:#82654a;
margin-left:8px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
display:block;
}

.info{
padding:15px;
}

.filename{
font-size:13px;
font-weight:bold;
margin-bottom:10px;
word-break:break-word;
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#6b4e36;
color:white;
}

.btn:hover{
opacity:.9;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

.footer{
text-align:center;
margin-top:50px;
font-size:13px;
color:#82654a;
}

.hidden{
display:none;
}

</style>
</head>
<body>

<div class="header">
<h1>🖼️ B5 Asset Library</h1>
<p>Auto Sync from GitHub Repository</p>
</div>

<div class="search">
<input
type="text"
id="search"
placeholder="Search images..."
onkeyup="filterImages()">
</div>

<div id="loading" class="loading">
Loading Assets...
</div>

<div id="content"></div>

<div class="footer">
B5 Asset Library © 2026
</div>

<script>

const OWNER = "bestfivecc-b5membership";
const REPO = "b5platform";

const CATEGORIES = [

{
folder:"food",
title:"🍔 Food"
},

{
folder:"rewards",
title:"🎁 Rewards"
},

{
folder:"promo",
title:"🔥 Promotions"
},

{
folder:"logos",
title:"🏷 Logos"
},

{
folder:"wheel",
title:"🎡 Wheel"
},

{
folder:"birthday",
title:"🎂 Birthday"
},

{
folder:"voucher",
title:"🎟 Voucher"
},

{
folder:"images",
title:"📦 Misc Images"
},

{
folder:"archive",
title:"🗄 Archive"
}

];

const content = document.getElementById("content");

async function loadAssets(){

for(const category of CATEGORIES){

await loadCategory(category);

}

document.getElementById("loading").style.display="none";

}

async function loadCategory(category){

try{

const api =
`https://api.github.com/repos/${OWNER}/${REPO}/contents/assets/${category.folder}`;

const response = await fetch(api);

const files = await response.json();

const images = files.filter(file => {

const name = file.name.toLowerCase();

return (
name.endsWith(".png") ||
name.endsWith(".jpg") ||
name.endsWith(".jpeg") ||
name.endsWith(".webp") ||
name.endsWith(".gif")
);

});

const section = document.createElement("div");

section.className = "section";

section.innerHTML = `
<div class="section-title">
${category.title}
<span class="count">(${images.length})</span>
</div>
<div class="grid"></div>
`;

const grid = section.querySelector(".grid");

images.forEach(file=>{

const imageUrl =
`${window.location.origin}/assets/${category.folder}/${file.name}`;

const card = document.createElement("div");

card.className = "card asset-card";

card.setAttribute(
"data-name",
file.name.toLowerCase()
);

card.innerHTML = `
<img src="${imageUrl}" loading="lazy">

<div class="info">

<div class="filename">
${file.name}
</div>

<button
class="btn"
onclick="copyUrl('${imageUrl}')">
Copy URL
</button>

</div>
`;

grid.appendChild(card);

});

content.appendChild(section);

}catch(err){

console.error(
"Error loading",
category.folder,
err
);

}

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert("Copied URL:\n\n" + url);

}

function filterImages(){

const keyword =
document
.getElementById("search")
.value
.toLowerCase();

const cards =
document.querySelectorAll(".asset-card");

cards.forEach(card=>{

const filename =
card.getAttribute("data-name");

if(filename.includes(keyword)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

loadAssets();

</script>

</body>
</html>
